<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 지표 진단 사이트</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 50px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 15px;
      font-size: 36px;
    }

    header p {
      margin: 0;
      color: #d1d5db;
      font-size: 16px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .search-box {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-top: -55px;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 15px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: #2563eb;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .notice {
      margin-top: 15px;
      font-size: 14px;
      color: #6b7280;
    }

    .result {
      margin-top: 30px;
    }

    .company-card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .company-card h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .company-info {
      color: #6b7280;
      line-height: 1.6;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .metric-title {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: bold;
    }

    .analysis-card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .analysis-card h3 {
      margin-top: 0;
    }

    .analysis-card ul {
      padding-left: 20px;
      line-height: 1.8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    th, td {
      padding: 15px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
    }

    th {
      background: #f9fafb;
      color: #374151;
    }

    .empty {
      background: white;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      line-height: 1.7;
    }

    .warning {
      margin-top: 30px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }

    @media (max-width: 800px) {
      .search-box {
        flex-direction: column;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      header h1 {
        font-size: 28px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>주식 매수 전 핵심 지표 진단</h1>
    <p>종목명 또는 종목코드를 입력하면 주요 투자 지표를 확인할 수 있습니다.</p>
  </header>

  <div class="container">

    <div class="search-box">
      <input id="stockInput" type="text" placeholder="예: 삼성전자, 005930">
      <button type="button" onclick="searchStock()">진단하기</button>
    </div>

    <p class="notice">
      현재는 Render 서버 API와 연결된 테스트 버전입니다. 실제 OpenDART 데이터 연결은 다음 단계에서 진행합니다.
    </p>

    <div id="result" class="result">
      <div class="empty">
        검색어를 입력하면 이곳에 주식 지표가 표시됩니다.
      </div>
    </div>

    <p class="warning">
      ※ 이 사이트는 투자 추천 서비스가 아닙니다. 표시되는 정보는 투자 판단 참고용이며, 실제 투자 결정은 본인의 책임입니다.
    </p>

  </div>

  <script>
    async function searchStock() {
      const input = document.getElementById("stockInput").value.trim();
      const result = document.getElementById("result");

      if (input === "") {
        result.innerHTML = `
          <div class="empty">
            검색어를 입력해주세요.
          </div>
        `;
        return;
      }

      result.innerHTML = `
        <div class="empty">
          데이터를 불러오는 중입니다...<br>
          입력값: ${input}
        </div>
      `;

      try {
        const apiUrl = "/api/stock?query=" + encodeURIComponent(input);
        const response = await fetch(apiUrl);
        const data = await response.json();

        if (!data.ok) {
          result.innerHTML = `
            <div class="empty">
              <strong>검색 결과를 가져오지 못했습니다.</strong><br><br>
              ${data.message || "알 수 없는 오류가 발생했습니다."}
            </div>
          `;
          return;
        }

        renderStock(data);

      } catch (error) {
        console.error("서버 연결 오류:", error);

        result.innerHTML = `
          <div class="empty">
            <strong>서버 연결 오류</strong><br><br>
            버튼은 작동했지만 서버 데이터를 불러오지 못했습니다.<br>
            /api/stock 주소가 정상 작동하는지 확인해주세요.
          </div>
        `;
      }
    }

    function renderStock(data) {
      const result = document.getElementById("result");

      const company = data.company || {};
      const metrics = data.metrics || {};
      const diagnosis = data.diagnosis || [];
      const financials = data.financials || [];

      result.innerHTML = `
        <div class="company-card">
          <h2>${company.name || "-"}</h2>
          <div class="company-info">
            종목코드: ${company.code || "-"}<br>
            시장: ${company.market || "-"}<br>
            업종: ${company.sector || "-"}
          </div>
        </div>

        <div class="metrics">
          <div class="metric-card">
            <div class="metric-title">PER</div>
            <div class="metric-value">${metrics.per || "-"}</div>
          </div>

          <div class="metric-card">
            <div class="metric-title">PBR</div>
            <div class="metric-value">${metrics.pbr || "-"}</div>
          </div>

          <div class="metric-card">
            <div class="metric-title">ROE</div>
            <div class="metric-value">${metrics.roe || "-"}</div>
          </div>

          <div class="metric-card">
            <div class="metric-title">부채비율</div>
            <div class="metric-value">${metrics.debtRatio || "-"}</div>
          </div>

          <div class="metric-card">
            <div class="metric-title">영업이익률</div>
            <div class="metric-value">${metrics.operatingMargin || "-"}</div>
          </div>

          <div class="metric-card">
            <div class="metric-title">순이익률</div>
            <div class="metric-value">${metrics.netMargin || "-"}</div>
          </div>

          <div class="metric-card">
            <div class="metric-title">배당수익률</div>
            <div class="metric-value">${metrics.dividendYield || "-"}</div>
          </div>

          <div class="metric-card">
            <div class="metric-title">데이터 상태</div>
            <div class="metric-value">서버 연결</div>
          </div>
        </div>

        <div class="analysis-card">
          <h3>자동 진단 코멘트</h3>
          <ul>
            ${
              diagnosis.length > 0
                ? diagnosis.map(item => `<li>${item}</li>`).join("")
                : "<li>진단 코멘트가 없습니다.</li>"
            }
          </ul>
        </div>

        <table>
          <thead>
            <tr>
              <th>연도</th>
              <th>매출</th>
              <th>영업이익</th>
              <th>순이익</th>
            </tr>
          </thead>
          <tbody>
            ${
              financials.length > 0
                ? financials.map(row => `
                    <tr>
                      <td>${row.year || "-"}</td>
                      <td>${row.revenue || "-"}</td>
                      <td>${row.operatingProfit || "-"}</td>
                      <td>${row.netProfit || "-"}</td>
                    </tr>
                  `).join("")
                : `
                    <tr>
                      <td colspan="4">재무 데이터가 없습니다.</td>
                    </tr>
                  `
            }
          </tbody>
        </table>
      `;
    }

    document.getElementById("stockInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        searchStock();
      }
    });
  </script>

</body>
</html>
